name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nil-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nil-app

      - name: Build
        run: npx vite build --base /nil/
        working-directory: nil-app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: nil-app/dist

      - uses: actions/deploy-pages@v4
        id: deploy
